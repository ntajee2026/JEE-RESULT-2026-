<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JEE Main Result 2026</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

/* Header */
.header {
    background: #0b2c4a;
    color: white;
    padding: 12px;
    text-align: center;
    font-size: 16px;
}

/* Container */
.container {
    width: 400px;
    margin: 60px auto;
    background: white;
    padding: 20px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
}

/* Title */
.title {
    background: #0b2c4a;
    color: white;
    padding: 10px;
    font-weight: bold;
    margin-bottom: 15px;
}

/* Labels */
label {
    font-size: 14px;
}

/* Inputs */
input {
    width: 100%;
    padding: 8px;
    margin: 6px 0 12px;
    border: 1px solid #ccc;
}

/* CAPTCHA */
.captcha-box {
    display: flex;
    align-items: center;
}

.captcha {
    background: #1e3a8a;
    color: white;
    padding: 6px 12px;
    font-weight: bold;
    margin-right: 10px;
}

/* Buttons */
.refresh {
    padding: 6px 10px;
    cursor: pointer;
}

.login-btn {
    width: 100%;
    padding: 10px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

.login-btn:hover {
    background: darkgreen;
}

/* Footer */
.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #0b2c4a;
    color: white;
    text-align: center;
    padding: 10px;
    font-size: 12px;
}
</style>

</head>

<body>

<div class="header">
JOINT ENTRANCE EXAMINATION (Main) – 2026 SESSION 2 (JANUARY 2026)<br>
NTA SCORE: Paper 2 (B.E./B.Tech.)
</div>

<div class="container">

<div class="title">🔒 View Result</div>

<label>Application Number :</label>
<input type="text" id="app">

<label>Password :</label>
<input type="password" id="pass">

<label>Enter CAPTCHA <span style="color:green">(case sensitive)</span> :</label>
<input type="text" id="captchaInput">

<div class="captcha-box">
    <div class="captcha" id="captchaText"></div>
    <button class="refresh" onclick="generateCaptcha()">↻</button>
</div>

<br>

<button class="login-btn" onclick="login()">LOGIN</button>

<p id="error" style="color:red;"></p>

<p style="text-align:right;">
<a href="#">Forgot Password ?</a>
</p>

</div>

<div class="footer">
This site is designed and hosted by NIC PEP Division. The contents are provided by NTA.
</div>

<script>

let currentCaptcha = "";

// Generate CAPTCHA
function generateCaptcha() {
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    currentCaptcha = "";
    for (let i = 0; i < 6; i++) {
        currentCaptcha += chars[Math.floor(Math.random() * chars.length)];
    }
    document.getElementById("captchaText").innerText = currentCaptcha;
}

generateCaptcha();

// Login Function
function login() {
    let app = document.getElementById("app").value;
    let pass = document.getElementById("pass").value;
    let captcha = document.getElementById("captchaInput").value;

    if (captcha !== currentCaptcha) {
        document.getElementById("error").innerText = "Invalid CAPTCHA";
        return;
    }

    if (app === "123456" && pass === "jee2026") {
        window.location.href = "result.html";
    } else {
        document.getElementById("error").innerText = "Invalid Application Number or Password";
    }
}

</script>

</body>
</html>
